name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            cc: gcc
            flags: "-static"
          - arch: arm64
            cc: aarch64-linux-gnu-gcc
            flags: "-static"
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: ${{ matrix.cc }} ${{ matrix.flags }} -o satan satan.c

      - name: Package
        run: tar czvf satan-linux-${{ matrix.arch }}.tar.gz satan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: satan-linux-${{ matrix.arch }}
          path: satan-linux-${{ matrix.arch }}.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x64
        run: clang -arch x86_64 -o satan satan.c

      - name: Package x64
        run: tar czvf satan-macos-x64.tar.gz satan

      - name: Build arm64
        run: clang -arch arm64 -o satan satan.c

      - name: Package arm64
        run: tar czvf satan-macos-arm64.tar.gz satan

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: satan-macos
          path: |
            satan-macos-x64.tar.gz
            satan-macos-arm64.tar.gz

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
